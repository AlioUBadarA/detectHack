<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Individuelle | Detect 'Hack 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; color: #1a1a1a; }
        .accent-red { color: #e63946; }
        .bg-red { background-color: #e63946; }
        .card { background: white; border-top: 6px solid #e63946; border-radius: 12px; }
        input, textarea, select { border: 1px solid #dee2e6 !important; border-radius: 8px !important; transition: all 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: #e63946 !important; outline: none; box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.2); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-2xl mx-auto">
        <div class="text-center mb-8">
            <img src="assets/SN-post-HackatonTN--email-banner.png" alt="Bannière Hackathon" class="w-full rounded-xl mb-6 shadow-md">
            <h1 class="text-3xl font-extrabold uppercase tracking-tight">Inscription <span class="accent-red">Individuelle</span></h1>
            <p class="text-gray-500 mt-2">Detect 'Hack 2026 : Relevez le défi technologique.</p>
        </div>

        <form id="hackathonForm" class="card p-8 shadow-2xl">
            <div class="mb-8">
                <h3 class="text-sm font-bold mb-4 uppercase tracking-widest text-gray-400">1. Informations Personnelles</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="prenom" placeholder="Prénom" required class="w-full p-3">
                    <input type="text" id="nom" placeholder="Nom" required class="w-full p-3">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                    <input type="email" id="email" placeholder="Email" required class="w-full p-3">
                    <input type="tel" id="telephone" placeholder="Téléphone (WhatsApp)" required class="w-full p-3">
                </div>
            </div>

            <div class="mb-8">
                <h3 class="text-sm font-bold mb-4 uppercase tracking-widest text-gray-400">2. Profil Technique</h3>
                <div class="mb-4">
                    <label class="block text-xs font-bold mb-1 text-gray-500">Spécialité *</label>
                    <select id="specialite" required class="w-full p-3 bg-white">
                        <option value="" disabled selected>Choisir...</option>
                        <option value="Développement Fullstack">Développement Fullstack</option>
                        <option value="Data & IA">Data Analytics / IA</option>
                        <option value="Cybersécurité">Cybersécurité</option>
                        <option value="UI/UX Design">UI/UX Design</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-xs font-bold mb-1 text-gray-500">Lien vers ton CV (Drive, PDF...) *</label>
                    <input type="url" id="cv_link" required placeholder="https://..." class="w-full p-3">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 text-gray-500">Certifications obtenues *</label>
                    <textarea id="certifications" rows="3" required class="w-full p-3" placeholder="Listez vos certifications majeures..."></textarea>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-red text-white font-bold py-4 rounded-lg shadow-lg hover:opacity-90 transition transform active:scale-95">
                S'INSCRIRE MAINTENANT
            </button>
        </form>

        <div id="successMsg" class="hidden card p-10 rounded-xl text-center shadow-xl mt-8">
            <h2 class="text-2xl font-bold accent-red mb-2">Inscription Enregistrée ! 🎯</h2>
            <p class="text-gray-600">Ton profil individuel est en cours d'examen. À très vite !</p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxklE6C3-Fr6dMxLiPK3eIr_6TppSItbvvWa_rQlBI4qBo-_S04boD4-OqFjOEHGZOL/exec"; 

        document.getElementById('hackathonForm').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Envoi...";

            const payload = {
                prenom: document.getElementById('prenom').value,
                nom: document.getElementById('nom').value,
                email: document.getElementById('email').value,
                telephone: document.getElementById('telephone').value,
                cv: document.getElementById('cv_link').value,
                certs: document.getElementById('certifications').value,
                specialite: document.getElementById('specialite').value
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            }).then(() => {
                document.getElementById('hackathonForm').classList.add('hidden');
                document.getElementById('successMsg').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        };
    </script>
</body>
</html>
